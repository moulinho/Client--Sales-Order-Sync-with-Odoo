services:

  db:
    image: postgres:15
    container_name: odoo18-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      retries: 10

  odoo:
    image: odoo:18
    container_name: odoo18
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./config:/etc/odoo
    restart: always

  backend:
    build:
      context: ./sikilli-backend
    container_name: skilli-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://odoo:odoo@db:5432/postgres

      ODOO_HOST: odoo
      ODOO_PORT: 8069
      ODOO_DB: skilli
      ODOO_USERNAME: admin
      ODOO_PASSWORD: admin

      PORT: 3001
    restart: always

  frontend:
    build:
      context: ./sikilli-frontend
    container_name: skilli-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:3001
    restart: always

volumes:
  odoo-db-data:
  odoo-web-data:

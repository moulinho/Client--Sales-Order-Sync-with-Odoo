version: "1"

services:
  - type: web
    name: sikilli-backend
    env: node
    region: frankfurt
    rootDir: sikilli-backend
    buildCommand: yarn install --production=false && npx prisma generate && yarn build
    startCommand: npx prisma migrate deploy && yarn start:prod
    envVars:
      - key: DATABASE_URL
        # Using the External Database URL with SSL so it works from any region
        value: postgresql://sikilli_user:azLbNQpMKGreSSObOuaEmixm8R2uBG16@dpg-d84tc8ojs32c73a352qg-a.frankfurt-postgres.render.com/sikilli?sslmode=require

  - type: web
    name: sikilli-frontend
    env: node
    region: frankfurt
    rootDir: sikilli-frontend
    buildCommand: yarn install --production=false && yarn build
    startCommand: yarn start
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: sikilli-backend
          envVarKey: RENDER_EXTERNAL_URL

version: "1"

services:
  # ── Odoo 18 ──────────────────────────────────────────────────────────────────
  - type: web
    name: sikilli-odoo
    env: docker
    region: frankfurt
    dockerfilePath: odoo.dockerfile
    # DB config is hardcoded in odoo.conf to avoid conflicts with Render's PORT var
    envVars:
      - key: PORT
        value: "8069"

  # ── NestJS Backend ────────────────────────────────────────────────────────────
  - type: web
    name: sikilli-backend
    env: node
    region: frankfurt
    rootDir: sikilli-backend
    buildCommand: yarn install --production=false && npx prisma generate && yarn build
    startCommand: npx prisma migrate deploy && yarn start:prod
    envVars:
      - key: DATABASE_URL
        value: postgresql://sikilli_1qg0_user:37G9L4dNZ6yL5sWySBFMlyxxMC9B0Wdp@dpg-d850m5jtqb8s73eekmqg-a.frankfurt-postgres.render.com/sikilli_1qg0?sslmode=require
      - key: ODOO_HOST
        fromService:
          type: web
          name: sikilli-odoo
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: ODOO_PORT
        value: "443"
      - key: ODOO_DB
        value: sikilli_1qg0
      - key: ODOO_USERNAME
        value: admin
      - key: ODOO_PASSWORD
        value: admin

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  - type: web
    name: sikilli-frontend
    env: node
    region: frankfurt
    rootDir: sikilli-frontend
    buildCommand: yarn install --production=false && yarn build
    startCommand: yarn start
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: sikilli-backend
          envVarKey: RENDER_EXTERNAL_URL

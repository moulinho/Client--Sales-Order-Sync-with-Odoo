version: "1"

services:
  - type: web
    name: sikilli-backend
    env: node
    region: frankfurt
    rootDir: sikilli-backend
    buildCommand: yarn install --production=false && npx prisma generate && yarn build
    startCommand: npx prisma migrate deploy && yarn start:prod
    envVars:
      - key: DATABASE_URL
        # New DB instance - External URL with SSL
        value: postgresql://sikilli_1qg0_user:37G9L4dNZ6yL5sWySBFMlyxxMC9B0Wdp@dpg-d850m5jtqb8s73eekmqg-a.frankfurt-postgres.render.com/sikilli_1qg0?sslmode=require
      - key: ODOO_HOST
        value: your-odoo-host.example.com
      - key: ODOO_PORT
        value: "8069"
      - key: ODOO_DB
        value: sikilli
      - key: ODOO_USERNAME
        value: admin
      - key: ODOO_PASSWORD
        value: admin

  - type: web
    name: sikilli-frontend
    env: node
    region: frankfurt
    rootDir: sikilli-frontend
    buildCommand: yarn install --production=false && yarn build
    startCommand: yarn start
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: sikilli-backend
          envVarKey: RENDER_EXTERNAL_URL
